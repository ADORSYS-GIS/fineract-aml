name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend Lint (advisory) ────────────────────────────────
  # Separate, non-blocking job. The backend carries a large pre-existing ruff baseline;
  # keeping lint OUT of the test job (and continue-on-error) means a lint violation no
  # longer aborts the run before pytest — so real test failures stay visible. Tighten or
  # remove continue-on-error once the baseline is burned down.
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: |
          cd backend
          ruff check .

  # ── Backend Tests ──────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    # Non-default test secrets so app.main's fail-closed production guards don't abort
    # collection (the app refuses to import with default secrets when AML_DEBUG=false).
    env:
      AML_FINERACT_WEBHOOK_SECRET: ci-test-webhook-secret
      AML_SECRET_KEY: ci-test-secret-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

      - name: Run tests with coverage
        run: |
          cd backend
          python -m pytest tests/ --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ── Dashboard Build ────────────────────────────────────────
  dashboard-build:
    name: Dashboard Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: |
          cd dashboard
          npm ci

      - name: Lint
        run: |
          cd dashboard
          npx biome check .

      - name: Build
        run: |
          cd dashboard
          npm run build

  # ── Docker Build ───────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-api:latest
            ghcr.io/${{ github.repository }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-dashboard:latest
            ghcr.io/${{ github.repository }}-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
